stages:
  - test
  - build
  - deploy

default:
  image: node:18

test_job:
  stage: test
  script:
    - echo "✅ Test job ran successfully"


build_job:
  stage: build
  script:
    - echo "✅ Build placeholder complete"


deploy_job:
  stage: deploy
  script:
    - echo "✅ Manual deploy placeholder"
  when: manual
