stages:
  - test
  - build
  - deploy

default:
  image: node:18


before_script:
  - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan -H ec2-13-233-51-250.ap-south-1.compute.amazonaws.com >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

test_job:
  stage: test
  script:
    - echo "✅ Test job ran successfully"


build_job:
  stage: build
  script:
    - echo "✅ Build placeholder complete"


deploy-prod:
  stage: deploy
  script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H ec2-13-233-51-250.ap-south-1.compute.amazonaws.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh ubuntu@ec2-13-233-51-250.ap-south-1.compute.amazonaws.com 'cd test && git pull'

deploy_job:
  stage: deploy
  script:
    - echo "✅ Manual deploy placeholder"
  when: manual
