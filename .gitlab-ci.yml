stages:
  - test
  - build
  - deploy

default:
  image: node:18

before_script:
  - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

test_job:
  stage: test
  script:
    - echo "✅ Test job ran successfully"

build_job:
  stage: build
  script:
    - echo "✅ Build placeholder complete"

deploy-prod:
  stage: deploy
  only:
    - main
  script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - |
      ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "
        cd /var/www/quizbuzz &&
        git pull origin main &&
        docker compose up -d --build &&
        docker compose ps
      "

deploy_job:
  stage: deploy
  script:
    - echo "✅ Manual deploy placeholder"
  when: manual